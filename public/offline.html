<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1b4b" />
  <title>Railly — You're Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #FAF9F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background-image: url(https://railly.s3.ap-southeast-1.amazonaws.com/assets/Railly_logo.png);
      background-size: cover;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 800; color: #111827; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 0.95rem; line-height: 1.6; max-width: 280px; margin: 0 auto; }
    .retry {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #0B4F6C;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .retry:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="logo"></div>
  <h1>You're offline</h1>
  <p>Check your connection and try again. Previously visited pages are still available.</p>
  <button class="retry" onclick="window.location.reload()">Try Again</button>
</body>
</html>
